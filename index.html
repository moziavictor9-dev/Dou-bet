<!DOCTYPE<!DOCTYPE html>
<html>
<head>
<title>DOU Bet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>DOU Bet</h1>

<div class="container">

<div class="sidebar">
<h3>Leagues</h3>
<p>English Premier League</p>
<p>La Liga</p>
<p>Serie A</p>
<p>Bundesliga</p>
<p>Champions League</p>
</div>

<div class="matches">

<h2>Manchester United vs Chelsea</h2>

<button onclick="placeBet('Manchester United',1.80)">
Manchester United - 1.80
</button>

<button onclick="placeBet('Chelsea',2.30)">
Chelsea - 2.30
</button>

<h2>Barcelona vs Real Madrid</h2>

<button onclick="placeBet('Barcelona',1.90)">
Barcelona - 1.90
</button>

<button onclick="placeBet('Real Madrid',2.10)">
Real Madrid - 2.10
</button>

</div>

<div class="betslip">

<h2>Bet Slip</h2>

<div id="betSlip"></div>

<input type="number" id="stake" placeholder="Enter stake">

<button onclick="calculateWinnings()">Calculate Winnings</button>

<p id="totalOdds"></p>
<p id="potentialWin"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
